name: Pester Tests

on:
  pull_request:
    paths:
      - '**.ps1'
      - '**.psm1'
      - 'tests/**'
      - '.agents/rules/**'
      - 'Module/**'
      - 'Environment/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: PowerShell/PowerShell-Setup@v2
        with:
          version: '7.4'

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Scope CurrentUser -Force -AllowClobber -ErrorAction Stop

      - name: Run Pester tests
        shell: pwsh
        run: |
          cd $GITHUB_WORKSPACE
          Invoke-Pester -Path ./tests -Output Detailed
